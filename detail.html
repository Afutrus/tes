<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Pesanan - Neo Party</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #ffffcc;
            font-family: Arial, sans-serif;
        }
        .bg-custom {
            background-image: url('/header-image.png');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
        }
        .glass-popup {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #33ccff;
        }
    </style>
</head>
<body>

    <div class="max-w-[800px] mx-auto bg-custom relative flex items-center justify-center p-6">
        
        <div class="glass-popup w-full max-w-[500px] rounded-3xl p-8 shadow-2xl flex flex-col items-center text-center">
            
            <div class="relative w-48 h-48 mb-4 border-4 border-[#33ccff] rounded-2xl overflow-hidden bg-white shadow-inner">
                <img src="/idbos.png" alt="ID Bos" class="w-full h-full object-contain">
            </div>

            <div class="bg-[#ccffff] border border-[#33ccff] rounded-xl px-6 py-2 mb-6 flex items-center gap-4">
                <span id="targetId" class="text-2xl font-black text-[#064B7F]">12345678</span>
                <button onclick="copyID()" class="bg-[#FD7100] text-white text-xs font-bold px-3 py-1 rounded-lg hover:opacity-80 transition">
                    COPY ID
                </button>
            </div>

            <h2 class="text-[#13AAB3] text-2xl font-black mb-6 uppercase tracking-wide">
                Silahkan Kirim Chip Disini
            </h2>

            <div class="w-full mb-6">
                <label class="block text-[#064B7F] font-bold mb-2">Upload Bukti Pengiriman (SS):</label>
                <input type="file" id="uploadSS" accept="image/*" class="w-full text-sm text-gray-500
                    file:mr-4 file:py-2 file:px-4
                    file:rounded-full file:border-0
                    file:text-sm file:font-semibold
                    file:bg-[#33ccff] file:text-white
                    hover:file:bg-[#13AAB3] cursor-pointer"
                >
            </div>

            <button onclick="handleSubmit()" class="w-48 hover:scale-105 transition-transform">
                <img src="/ok.png" alt="Tentukan" class="w-full">
            </button>

        </div>
    </div>

    <script>
        // Fungsi untuk menyalin ID ke clipboard
        function copyID() {
            const idText = document.getElementById('targetId').innerText;
            navigator.clipboard.writeText(idText).then(() => {
                alert("ID Berhasil disalin: " + idText);
            });
        }

        // Fungsi menangkap data dari URL (dari halaman sebelumnya)
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const playerID = params.get('id');
            const price = params.get('pay');
            const method = params.get('method');

            console.log("Pesanan dari Player:", playerID, "Harga:", price, "Metode:", method);
            // Anda bisa menampilkan data ini di teks jika perlu
        };

        // Fungsi saat tombol OK ditekan
        function handleSubmit() {
            const fileInput = document.getElementById('uploadSS');
            if (fileInput.files.length === 0) {
                alert("Mohon upload bukti screenshot terlebih dahulu!");
                return;
            }
            
            alert("Bukti telah terkirim! Admin akan segera memproses pencairan Anda.");
            window.location.href = "index.html"; // Kembali ke halaman utama
        }
    </script>
</body>
</html>
